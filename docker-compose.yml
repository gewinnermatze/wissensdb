services:
  postgres:
    image: timescale/timescaledb-ha:pg16
    profiles:
      - db
    environment:
      POSTGRES_DB: ${WISSENSDB_POSTGRES_DB:-wissensdb}
      POSTGRES_USER: ${WISSENSDB_POSTGRES_USER:-wissensdb}
      POSTGRES_PASSWORD: ${WISSENSDB_POSTGRES_PASSWORD:-change-me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WISSENSDB_POSTGRES_USER:-wissensdb} -d ${WISSENSDB_POSTGRES_DB:-wissensdb}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  wissensdb-api:
    image: ghcr.io/gewinnermatze/wissensdb:local
    build: .
    env_file:
      - .env
    ports:
      - "${WISSENSDB_API_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres-data:
